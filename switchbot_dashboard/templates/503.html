<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Service Indisponible - SwitchBot Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/css/bootstrap.min.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/css/space-grotesk.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/css/all.min.css') }}" />
    <style>
      .error-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--sb-spacing-lg);
      }
      .error-card {
        background: var(--sb-card);
        border: 1px solid var(--sb-card-border);
        box-shadow: var(--sb-shadow);
        border-radius: 16px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        width: 100%;
        max-width: 500px;
        padding: var(--sb-spacing-xl);
        text-align: center;
        transition: transform var(--sb-transition-normal), box-shadow var(--sb-transition-normal);
      }
      .error-card:hover {
        transform: translateY(var(--sb-translate-hover));
        box-shadow: var(--sb-glass-shadow-hover);
        border-color: var(--sb-glass-border-hover);
      }
      .error-icon {
        font-size: 4rem;
        color: var(--sb-warning);
        margin-bottom: var(--sb-spacing-lg);
        text-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
      }
      .btn-sb {
        background: var(--sb-accent);
        color: var(--sb-background);
        font-weight: 600;
        border: none;
        border-radius: 8px;
        padding: 0.8rem 1.5rem;
        transition: all var(--sb-transition-fast);
      }
      .btn-sb:hover {
        background: var(--sb-accent-hover, #6495ED);
        box-shadow: var(--sb-glass-shadow-hover);
        color: var(--sb-background);
      }
    </style>
  </head>
  <body class="sb-bg">
    <main id="app-content">
    <div class="error-container">
      <div class="error-card">
        <div class="error-icon">
          <i class="fas fa-database" aria-hidden="true"></i>
        </div>
        <h1 class="h3 mb-3 text-light">Base de données indisponible</h1>
        <p class="text-secondary mb-4">
          Le stockage des données (PostgreSQL) n'est pas accessible actuellement. L'application ne peut pas fonctionner sans son support de stockage principal.
        </p>
        <div class="d-grid gap-2">
          <a href="{{ url_for('dashboard.index') }}" class="btn btn-sb">
            <i class="fas fa-sync-alt me-2" aria-hidden="true"></i>Réessayer
          </a>
        </div>
      </div>
    </div>
    </main>
  </body>
</html>
